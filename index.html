<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VGV Price - Login</title>
  <style>
    :root {
      --bg: #0b1731;
      --bg-layer: rgba(4, 25, 61, 0.67);
      --card: rgba(255, 255, 255, 0.96);
      --text: #11203e;
      --muted: #5c6b8a;
      --primary: #1649a5;
      --primary-dark: #0f3572;
      --danger: #c63535;
      --border: rgba(21, 64, 140, 0.16);
      --shadow: 0 20px 50px rgba(7, 27, 69, 0.22);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, rgba(15, 39, 90, 0.92), rgba(3, 14, 33, 0.9)),
        url('background.png') no-repeat center/cover fixed;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 16px 24px;
    }

    @media (max-width: 700px) {
      body {
        padding: 200px 12px 24px;
      }
    }

    .login-container {
      width: min(300px, 100%);
      margin-top: 10px;
      background: var(--card);
      border-radius: 22px;
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(18px);
    }

    @media (max-width: 700px) {
      .login-container {
        margin-top: 50px;
      }
    }

    .login-container img {
      display: block;
      width: 145px;
      max-width: 100%;
      margin: 0 auto 1.4rem;
    }

    .login-container form {
      display: grid;
      gap: 1.4rem;
    }

    .form-group {
      display: grid;
      gap: 0.55rem;
    }

    label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      font-size: 1rem;
      color: var(--text);
      background: #f8f9ff;
    }

    input:focus {
      outline: 2px solid rgba(22, 73, 165, 0.22);
      border-color: rgba(22, 73, 165, 0.35);
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 30px rgba(22, 73, 165, 0.25);
    }

    .error-message {
      display: none;
      color: var(--danger);
      font-size: 0.95rem;
      text-align: center;
      margin-top: 0.5rem;
    }

    @media (max-width: 600px) {
      body {
        padding: 0 12px;
      }

      .login-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <img src="vgvprice-logo.png" alt="VGV Price" class="vgv-logo" />
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="empresa">Empresa</label>
        <input type="text" id="empresa" name="empresa" value="lancar21" required readonly>
      </div>
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" value="admin" required readonly>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" value="lancar" required readonly>
      </div>
      <button type="submit" class="btn-primary">Logar</button>
      <div id="loginError" class="error-message"></div>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
