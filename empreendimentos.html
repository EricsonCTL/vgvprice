<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VGV Price · Empreendimentos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Paleta harmonizada com index.html + logo VGVPrice ── */
      --forest:    #2d5a1b;
      --forest-d:  #1e3d12;
      --forest-l:  #4a8a2e;
      --forest-xl: #e8f2e1;
      --gold:      #8a6a1a;
      --gold-l:    #c8a84b;
      --gold-xl:   #f5eed8;
      --ink:       #1a1f16;
      --ink2:      #3d4a35;
      --ink3:      #7a8a72;
      --paper:     #f7f5f0;
      --paper2:    #edeae2;
      --paper3:    #e2ddd2;
      --white:     #ffffff;
      --alert:     #b83232;

      /* Azul VGVPrice (da logo) */
      --vgv-blue:  #15408c;
      --vgv-green: #22a05a;

      --border: rgba(45,90,27,.12);
      --shadow: 0 4px 20px rgba(30,61,18,.10);
      --shadow-lg: 0 12px 40px rgba(30,61,18,.14);
      --r: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ════════════════════════════════
       NAV — espelho do index.html
    ════════════════════════════════ */
    nav {
      background: var(--forest-d);
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 2px 16px rgba(0,0,0,.25);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      height: 68px;
      gap: 16px;
    }

    .nav-logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-logo {
      height: 44px;
      width: auto;
      display: block;
      border-radius: 10px;
      background: rgba(255,255,255,.96);
      padding: 5px 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }

    .nav-divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,.18);
      flex-shrink: 0;
    }

    .nav-page-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.65);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .nav-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .nav-btn.back {
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.15);
    }

    .nav-btn.back:hover {
      background: rgba(255,255,255,.18);
      color: #fff;
    }

    .nav-btn.logout {
      background: rgba(184,50,50,.18);
      color: rgba(255,160,160,.9);
      border: 1px solid rgba(184,50,50,.25);
    }

    .nav-btn.logout:hover {
      background: rgba(184,50,50,.28);
      color: #ffb3b3;
    }

    /* ════════════════════════════════
       HERO
    ════════════════════════════════ */
    .hero {
      background: linear-gradient(135deg, var(--forest-d) 0%, var(--forest) 60%, var(--forest-l) 100%);
      color: #fff;
      padding: 3rem 1.5rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: rgba(200,168,75,.08);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 15%;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(200,168,75,.05);
      pointer-events: none;
    }

    /* Logo d'água no hero */
    .hero-watermark {
      position: absolute;
      right: 3%;
      bottom: -10px;
      height: 140px;
      width: auto;
      opacity: .06;
      pointer-events: none;
      filter: brightness(0) invert(1);
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold-l);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 24px; height: 2px;
      background: var(--gold-l);
      border-radius: 2px;
    }

    .hero h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 12px;
      letter-spacing: -.01em;
    }

    .hero-sub {
      font-size: 1rem;
      color: rgba(255,255,255,.62);
      max-width: 520px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .hero-stats {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .hero-stat {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      padding: .7rem 1.1rem;
      backdrop-filter: blur(4px);
    }

    .hero-stat .sv {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .hero-stat .sl {
      font-size: 10px;
      color: rgba(255,255,255,.58);
      margin-top: 3px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ════════════════════════════════
       MAIN CONTENT
    ════════════════════════════════ */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Section header ── */
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 1.4rem;
      padding-bottom: .65rem;
      border-bottom: 2px solid var(--forest-xl);
    }

    .sh-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--forest);
      flex-shrink: 0;
    }

    .section-head h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--forest-d);
      letter-spacing: .01em;
    }

    .sh-meta {
      font-size: 12px;
      color: var(--ink3);
      margin-left: auto;
    }

    /* ════════════════════════════════
       CARDS GRID
    ════════════════════════════════ */
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .emp-card {
      background: var(--white);
      border: .5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
      cursor: default;
    }

    .emp-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    /* Topo colorido do card */
    .card-head {
      background: var(--forest-d);
      padding: .95rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-head.quintas { background: linear-gradient(120deg, var(--forest-d), var(--forest)); }
    .card-head.other   { background: linear-gradient(120deg, #2a3a28, #3d5436); }

    .card-name {
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .03em;
    }

    .card-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-alta  { background: rgba(184,50,50,.25);  color: #ffaaaa; }
    .badge-media { background: rgba(200,168,75,.25); color: var(--gold-l); }
    .badge-baixa { background: rgba(74,138,46,.28);  color: #8de07a; }

    /* Body do card */
    .card-body {
      padding: 1.1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    .card-vgv {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--forest-d);
      line-height: 1;
    }

    .card-vgv-label {
      font-size: 10px;
      color: var(--ink3);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .card-kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .ckpi {
      background: var(--paper);
      border-radius: 8px;
      padding: .5rem .6rem;
    }

    .ckpi .cv {
      font-size: .9rem;
      font-weight: 700;
      color: var(--forest-d);
      line-height: 1;
    }

    .ckpi .cl {
      font-size: 10px;
      color: var(--ink3);
      margin-top: 2px;
    }

    /* Barra de progresso de vendas */
    .card-progress-wrap {
      background: var(--paper2);
      border-radius: 6px;
      overflow: hidden;
    }

    .card-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink3);
      margin-bottom: 5px;
    }

    .card-progress-bar {
      height: 6px;
      background: var(--paper3);
      border-radius: 3px;
      overflow: hidden;
    }

    .card-progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--forest), var(--forest-l));
      transition: width .6s ease;
    }

    /* Dias sem reajuste */
    .card-reajuste {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--ink3);
    }

    .reaj-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .reaj-dot.ok   { background: #4a8a2e; }
    .reaj-dot.warn { background: var(--gold-l); }
    .reaj-dot.late { background: var(--alert); }

    /* Footer do card */
    .card-footer {
      padding: .85rem 1.2rem;
      border-top: .5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .btn-ver {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      background: var(--forest);
      color: #fff;
    }

    .btn-ver:hover {
      background: var(--forest-d);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(30,61,18,.22);
    }

    .btn-ver.disabled {
      background: var(--paper3);
      color: var(--ink3);
      cursor: not-allowed;
    }

    .btn-ver.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    /* ════════════════════════════════
       FOOTER
    ════════════════════════════════ */
    .site-footer {
      background: var(--forest-d);
      color: rgba(255,255,255,.45);
      text-align: center;
      font-size: 11px;
      padding: 1.2rem;
      letter-spacing: .04em;
    }

    .site-footer strong { color: rgba(255,255,255,.75); }

    /* ════════════════════════════════
       MOBILE
    ════════════════════════════════ */
    @media (max-width: 768px) {
      .nav-page-label { display: none; }
      .nav-divider { display: none; }

      .nav-btn { padding: 7px 13px; font-size: 12px; }

      .hero { padding: 2rem 1.2rem 1.8rem; }
      .hero-watermark { height: 90px; }

      .hero h1 { font-size: 1.75rem; }
      .hero-sub { font-size: .92rem; }

      .hero-stat .sv { font-size: 1.15rem; }

      .page { padding: 1.5rem 1rem 3rem; }

      .emp-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card-vgv { font-size: 1.35rem; }
    }

    @media (max-width: 400px) {
      .nav-btn.back span { display: none; }
      .hero-stats { gap: .7rem; }
      .hero-stat { padding: .6rem .85rem; }
    }

    /* ── Animação de entrada dos cards ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emp-card {
      opacity: 0;
      animation: fadeUp .45s ease forwards;
    }

    /* ── LOGO FIXA FLUTUANTE ── */
.site-logo{position:fixed;top:0;left:1.5rem;z-index:1100;height:100px;width:auto;display:block;pointer-events:none}
@media(max-width:768px){
  .site-logo{left:1rem;height:85px}
}
  </style>
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo-wrap">
      <img src="lançar21.png" alt="Quintas da Mata" class="site-logo">
    </div>
    <div class="nav-actions">
      <a href="quintas.html" class="nav-btn back">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Voltar</span>
      </a>
      <a href="index.html" class="nav-btn logout">Logout</a>
    </div>
  </div>
</nav>

<!-- ═══════════════ HERO ═══════════════ -->
<div class="hero">
  <img src="vgvprice-logo.png" alt="" class="hero-watermark" aria-hidden="true">
  <div class="hero-inner">
    <div class="hero-eyebrow">Portfólio</div>
    <h1>Empreendimentos</h1>
    <p class="hero-sub">Visão consolidada de todos os ativos imobiliários. Acesse a análise completa de cada empreendimento com um clique.</p>
    <div class="hero-stats" id="hero-stats">
      <!-- preenchido pelo JS -->
    </div>
  </div>
</div>

<!-- ═══════════════ CONTEÚDO ═══════════════ -->
<div class="page">

  <div class="section-head">
    <div class="sh-dot"></div>
    <h2>Todos os empreendimentos</h2>
    <span class="sh-meta" id="sh-meta">— empreendimentos</span>
  </div>

  <div class="emp-grid" id="emp-grid">
    <!-- cards gerados pelo JS -->
  </div>

</div>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer class="site-footer">
  <strong>VGV Price</strong> · Engenharia de Precificação Imobiliária
</footer>

<script>
  const dados = [
    {
      nome: 'Quintas da Mata',
      vgv: 8426429.63,
      disponiveis: 124,
      total: 180,
      quadras: 13,
      diasSemReajuste: 0,
      href: 'quintas.html',
      destaque: true
    },
    {
      nome: 'Novo Horizonte',
      vgv: 5200000,
      disponiveis: 98,
      total: 120,
      quadras: 10,
      diasSemReajuste: 60,
      href: null
    },
    {
      nome: 'Reserva Verde',
      vgv: 3800000,
      disponiveis: 76,
      total: 110,
      quadras: 8,
      diasSemReajuste: 30,
      href: null
    },
    {
      nome: 'Parque Central',
      vgv: 4100000,
      disponiveis: 62,
      total: 95,
      quadras: 9,
      diasSemReajuste: 45,
      href: null
    }
  ];

  function calcPrioridade(emp) {
    let s = 0;
    if (emp.diasSemReajuste > 30) s += 2;
    else if (emp.diasSemReajuste > 15) s += 1;
    const perc = emp.disponiveis / emp.total;
    if (perc > 0.6) s += 2;
    else if (perc > 0.4) s += 1;
    const vel = (emp.total - emp.disponiveis) / emp.total;
    if (vel > 0.7) s += 1;
    if (s >= 4) return 'alta';
    if (s >= 3) return 'media';
    return 'baixa';
  }

  function fmtBRL(v) {
    return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function fmtBRLM(v) {
    if (v >= 1e6) return 'R$ ' + (v / 1e6).toFixed(2).replace('.', ',') + ' M';
    return fmtBRL(v);
  }

  function reajInfo(dias) {
    if (dias === 0) return { cls: 'ok', txt: 'Recém reajustado' };
    if (dias <= 30) return { cls: 'ok', txt: `${dias} dias sem reajuste` };
    if (dias <= 60) return { cls: 'warn', txt: `${dias} dias sem reajuste` };
    return { cls: 'late', txt: `${dias} dias sem reajuste ⚠` };
  }

  function renderHeroStats() {
    const totalVgv = dados.reduce((a, e) => a + e.vgv, 0);
    const totalLotes = dados.reduce((a, e) => a + e.disponiveis, 0);
    const el = document.getElementById('hero-stats');
    el.innerHTML = `
      <div class="hero-stat"><div class="sv">${dados.length}</div><div class="sl">Empreendimentos</div></div>
      <div class="hero-stat"><div class="sv">${totalLotes}</div><div class="sl">Lotes disponíveis</div></div>
      <div class="hero-stat"><div class="sv">${fmtBRLM(totalVgv)}</div><div class="sl">VGV Total</div></div>
    `;
  }

  function renderCards() {
    const grid = document.getElementById('emp-grid');
    document.getElementById('sh-meta').textContent = `${dados.length} empreendimentos`;

    dados.forEach((emp, i) => {
      const pri = calcPrioridade(emp);
      const priLabels = { alta: 'Prioridade alta', media: 'Atenção média', baixa: 'Estável' };
      const vendidos = emp.total - emp.disponiveis;
      const percVendido = Math.round((vendidos / emp.total) * 100);
      const reaj = reajInfo(emp.diasSemReajuste);

      const headClass = emp.destaque ? 'quintas' : 'other';

      const btnHtml = emp.href
        ? `<button class="btn-ver" onclick="window.location.href='${emp.href}'">Abrir análise →</button>`
        : `<button class="btn-ver disabled" disabled title="Em desenvolvimento">Em breve</button>`;

      const card = document.createElement('article');
      card.className = 'emp-card';
      card.style.animationDelay = `${i * 0.08}s`;

      card.innerHTML = `
        <div class="card-head ${headClass}">
          <span class="card-name">${emp.nome}</span>
          <span class="card-badge badge-${pri}">${priLabels[pri]}</span>
        </div>
        <div class="card-body">
          <div>
            <div class="card-vgv">${fmtBRL(emp.vgv)}</div>
            <div class="card-vgv-label">VGV — Valor Geral de Vendas</div>
          </div>
          <div class="card-kpis">
            <div class="ckpi">
              <div class="cv">${emp.disponiveis}</div>
              <div class="cl">Disponíveis</div>
            </div>
            <div class="ckpi">
              <div class="cv">${vendidos}</div>
              <div class="cl">Vendidos</div>
            </div>
            <div class="ckpi">
              <div class="cv">${emp.quadras}</div>
              <div class="cl">Quadras</div>
            </div>
          </div>
          <div>
            <div class="card-progress-label">
              <span>Velocidade de vendas</span>
              <span>${percVendido}%</span>
            </div>
            <div class="card-progress-bar">
              <div class="card-progress-fill" style="width:${percVendido}%"></div>
            </div>
          </div>
          <div class="card-reajuste">
            <span class="reaj-dot ${reaj.cls}"></span>
            <span>${reaj.txt}</span>
          </div>
        </div>
        <div class="card-footer">
          ${btnHtml}
        </div>
      `;

      grid.appendChild(card);
    });
  }

  renderHeroStats();
  renderCards();
</script>
</body>
</html>
