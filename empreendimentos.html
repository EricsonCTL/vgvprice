<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empreendimentos</title>
  <style>
    :root {
      --bg: #f4f3ef;
      --card: #fff;
      --text: #1d1d1b;
      --muted: #5f5d57;
      --primary: #1649a5;
      --border: rgba(22, 73, 165, 0.14);
      --shadow: 0 12px 30px rgba(22, 73, 165, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .page { max-width: 980px; margin: 0 auto; padding: 24px; }
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    h1 { font-size: clamp(1.8rem, 2.2vw, 2.4rem); }
    .btn-logout {
      padding: 0.95rem 1.2rem;
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; box-shadow: var(--shadow); padding: 24px; }
    p { color: var(--muted); line-height: 1.75; }
    a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <p style="font-size: 0.95rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);">Área restrita</p>
        <h1>Empreendimentos</h1>
      </div>
      <button id="logoutBtn" class="btn-logout">Logout</button>
    </header>
    <section class="card">
      <p>Esta página é estática e só deve ser acessada por usuários autenticados. Se quiser consultar a tabela dinâmica do Quintas da Mata, use o login e selecione "Quinta-jamata" no menu.</p>
      <p>Para sair, use o botão <strong>Logout</strong>.</p>
    </section>
  </div>
  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (!(await verifySession())) {
        redirectToLogin();
        return;
      }
      document.getElementById('logoutBtn')?.addEventListener('click', redirectToLogin);
    });
  </script>
</body>
</html>
